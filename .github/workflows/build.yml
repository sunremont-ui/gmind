name: Build Windows .msi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gmind/frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        working-directory: gmind/frontend
        run: npm ci

      - name: Build Go sidecar
        working-directory: gmind/backend
        shell: pwsh
        run: |
          $env:CGO_ENABLED = '0'
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          New-Item -ItemType Directory -Force ../frontend/src-tauri/binaries | Out-Null
          go build -o ../frontend/src-tauri/binaries/gmind-server-x86_64-pc-windows-msvc.exe ./cmd/server

      - name: Run backend tests
        working-directory: gmind/backend
        run: go test ./...

      - name: Build Tauri app (.msi)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gmind/frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Gmind ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmind-windows-installer
          path: gmind/frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30
