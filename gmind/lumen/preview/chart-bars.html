<!doctype html>
<html><head><meta charset="utf-8"><title>Chart · bars</title><link rel="stylesheet" href="_card.css">
<style>
  .chart-well {
    background: #ECF0F3;
    border-radius: 16px;
    padding: 18px 14px 8px;
    box-shadow:
      inset 5px 5px 11px rgba(120,140,180,0.28),
      inset -5px -5px 11px rgba(255,255,255,0.92);
  }
  .legend-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border-radius: 999px;
    background: #ECF0F3;
    box-shadow:
      3px 3px 7px rgba(120,140,180,0.28),
      -3px -3px 7px rgba(255,255,255,0.92);
    font: 500 12px 'Inter';
    color: #2A3340;
  }
  .swatch-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="lds-eyebrow">Plays by genre</div>

  <div class="chart-well">
    <svg viewBox="0 0 700 220" style="width:100%;height:220px">
      <defs>
        <linearGradient id="barG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#8FB6F4"/>
          <stop offset="100%" stop-color="#5B9DF0"/>
        </linearGradient>
        <linearGradient id="barG2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#C9B5FB"/>
          <stop offset="100%" stop-color="#A78BFA"/>
        </linearGradient>
        <!-- soft drop-shadow that reads as raised on the recessed well -->
        <filter id="barLift" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="rgba(60,90,140,0.30)"/>
          <feDropShadow dx="-1.5" dy="-1.5" stdDeviation="1.5" flood-color="rgba(255,255,255,0.85)"/>
        </filter>
      </defs>
      <line x1="0" y1="190" x2="700" y2="190" stroke="rgba(120,140,180,0.20)"/>
      <g filter="url(#barLift)">
        <rect x="20" y="100" width="50" height="90" rx="8" fill="url(#barG)"/>
        <rect x="78" y="60" width="50" height="130" rx="8" fill="url(#barG2)"/>
        <rect x="136" y="120" width="50" height="70" rx="8" fill="url(#barG)"/>
        <rect x="194" y="40" width="50" height="150" rx="8" fill="url(#barG2)"/>
        <rect x="252" y="80" width="50" height="110" rx="8" fill="url(#barG)"/>
        <rect x="310" y="135" width="50" height="55" rx="8" fill="url(#barG)"/>
        <rect x="368" y="70" width="50" height="120" rx="8" fill="url(#barG2)"/>
        <rect x="426" y="115" width="50" height="75" rx="8" fill="url(#barG)"/>
        <rect x="484" y="95" width="50" height="95" rx="8" fill="url(#barG)"/>
        <rect x="542" y="160" width="50" height="30" rx="8" fill="url(#barG)"/>
        <rect x="600" y="50" width="50" height="140" rx="8" fill="url(#barG2)"/>
      </g>
    </svg>
    <div class="row" style="font:500 11px 'Inter';color:#6B7180;justify-content:space-between;padding:0 24px">
      <span>Ambient</span><span>Lofi</span><span>House</span><span>Pop</span><span>Rock</span><span>Jazz</span><span>Classical</span><span>Hip-hop</span><span>R&amp;B</span><span>Folk</span><span>Soul</span>
    </div>
  </div>

  <div class="row" style="gap:10px">
    <span class="legend-pill"><span class="swatch-dot" style="background:linear-gradient(180deg,#8FB6F4,#5B9DF0)"></span>This week</span>
    <span class="legend-pill"><span class="swatch-dot" style="background:linear-gradient(180deg,#C9B5FB,#A78BFA)"></span>Last week</span>
  </div>
</div>
</body></html>
