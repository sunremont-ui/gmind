<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="lds-eyebrow">Semantic · status</div>
  <div class="row" style="gap:12px">
    <div style="flex:1">
      <div class="swatch" style="height:64px;background:#10B981;color:#fff;display:flex;align-items:flex-end;padding:10px;border-radius:12px"><span style="font-weight:600;font-size:13px">Success</span></div>
      <div class="mono" style="margin-top:6px">#10B981</div>
    </div>
    <div style="flex:1">
      <div class="swatch" style="height:64px;background:#F59E0B;color:#fff;display:flex;align-items:flex-end;padding:10px;border-radius:12px"><span style="font-weight:600;font-size:13px">Warning</span></div>
      <div class="mono" style="margin-top:6px">#F59E0B</div>
    </div>
    <div style="flex:1">
      <div class="swatch" style="height:64px;background:#EF4444;color:#fff;display:flex;align-items:flex-end;padding:10px;border-radius:12px"><span style="font-weight:600;font-size:13px">Danger</span></div>
      <div class="mono" style="margin-top:6px">#EF4444</div>
    </div>
    <div style="flex:1">
      <div class="swatch" style="height:64px;background:#3B82F6;color:#fff;display:flex;align-items:flex-end;padding:10px;border-radius:12px"><span style="font-weight:600;font-size:13px">Info</span></div>
      <div class="mono" style="margin-top:6px">#3B82F6</div>
    </div>
  </div>
  <div class="label">Saturated but not neon. Pair each with a 10% soft tint for backgrounds (toasts, banners).</div>
</div>
</body></html>
