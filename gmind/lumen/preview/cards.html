<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title><link rel="stylesheet" href="_card.css">
<style>
  .neu-shell{ background:#ECF0F3; border-radius:18px; padding:24px;
    box-shadow: 10px 10px 26px rgba(120,140,180,0.22), -10px -10px 26px #FFFFFF; }
  .ncard{ flex:1; background:#ECF0F3; border-radius:16px; padding:18px;
    box-shadow: 8px 8px 20px rgba(120,140,180,0.24), -8px -8px 20px #FFFFFF; }
  .ncard.grad{ background:linear-gradient(135deg,#5B9DF0 0%,#5DC79A 55%,#A78BFA 100%); color:#fff;
    box-shadow: 8px 8px 20px rgba(120,140,200,0.36), -8px -8px 20px #FFFFFF; }
  .ncard .iconbox{ width:38px;height:38px;border-radius:10px;background:#ECF0F3;display:flex;align-items:center;justify-content:center;color:#5B9DF0;
    box-shadow: inset 3px 3px 6px rgba(120,140,180,0.30), inset -3px -3px 6px #FFFFFF; }
  .ncard .ph{ margin-top:14px;height:38px;background:#ECF0F3;border-radius:10px;
    box-shadow: inset 3px 3px 7px rgba(120,140,180,0.28), inset -3px -3px 7px #FFFFFF; }
  .ncard .upbtn{ background:#ECF0F3;color:#15151B;border:0;border-radius:10px;padding:7px 14px;font:600 13px 'Inter';cursor:pointer;
    box-shadow: 3px 3px 7px rgba(120,140,180,0.30), -3px -3px 7px #FFFFFF; }
</style>
</head>
<body>
<div class="card neu-shell">
  <div class="lds-eyebrow">Cards</div>
  <div class="row" style="gap:16px;align-items:stretch">
    <div class="ncard">
      <div style="font:500 12px 'Inter';color:#76767F">Active sessions</div>
      <div style="font:600 30px/1.1 'Inter';letter-spacing:-0.02em;margin-top:6px">2 481</div>
      <div style="font:600 12px 'Inter';color:#10B981;margin-top:6px">▲ 12.4% vs last week</div>
    </div>
    <div class="ncard grad">
      <div style="font:500 12px 'Inter';opacity:0.9">Lumen Pro</div>
      <div style="font:600 22px/1.2 'Inter';letter-spacing:-0.01em;margin-top:8px">Unlock unlimited<br/>streams</div>
      <button class="upbtn" style="margin-top:12px">Upgrade</button>
    </div>
    <div class="ncard">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="iconbox">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </div>
        <div>
          <div style="font:600 14px 'Inter'">Late night drive</div>
          <div style="font:400 12px 'Inter';color:#76767F">24 tracks · 1h 42m</div>
        </div>
      </div>
      <div class="ph"></div>
    </div>
  </div>
</div>
</body></html>
