<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="lds-eyebrow">Spacing · 4-pt scale</div>
  <div class="col" style="gap:8px">
    <div class="row"><div style="width:48px" class="mono">4</div><div style="width:4px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">8</div><div style="width:8px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">12</div><div style="width:12px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">16</div><div style="width:16px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">20</div><div style="width:20px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">24</div><div style="width:24px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">32</div><div style="width:32px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">48</div><div style="width:48px;height:16px;background:var(--color-primary)"></div></div>
    <div class="row"><div style="width:48px" class="mono">64</div><div style="width:64px;height:16px;background:var(--color-primary)"></div></div>
  </div>
</div>
</body></html>
