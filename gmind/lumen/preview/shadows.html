<!doctype html>
<html><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="_card.css">
<style>
  .neu-card{ background:#ECF0F3; border-radius:18px; padding:24px;
    box-shadow: 10px 10px 26px rgba(120,140,180,0.22), -10px -10px 26px #FFFFFF; }
  .swatch{ width:88px; height:88px; background:#ECF0F3; border-radius:18px; }
  .e-xs{ box-shadow: 2px 2px 5px rgba(120,140,180,0.18), -2px -2px 5px #FFFFFF; }
  .e-sm{ box-shadow: 4px 4px 10px rgba(120,140,180,0.22), -4px -4px 10px #FFFFFF; }
  .e-md{ box-shadow: 8px 8px 18px rgba(120,140,180,0.26), -8px -8px 18px #FFFFFF; }
  .e-lg{ box-shadow: 12px 12px 28px rgba(120,140,180,0.30), -12px -12px 28px #FFFFFF; }
  .e-xl{ box-shadow: 18px 18px 40px rgba(120,140,180,0.34), -18px -18px 40px #FFFFFF; }
  .e-inset{ box-shadow: inset 6px 6px 14px rgba(120,140,180,0.30), inset -6px -6px 14px #FFFFFF; }
  .col{ text-align:center; }
  .col .mono{ margin-top:10px; }
</style>
</head>
<body>
<div class="card neu-card">
  <div class="lds-eyebrow">Elevation · soft neumorph</div>

  <div class="row" style="gap:24px;justify-content:space-between;align-items:flex-end">
    <div class="col"><div class="swatch e-xs"></div><div class="mono">xs</div></div>
    <div class="col"><div class="swatch e-sm"></div><div class="mono">sm</div></div>
    <div class="col"><div class="swatch e-md"></div><div class="mono">md</div></div>
    <div class="col"><div class="swatch e-lg"></div><div class="mono">lg</div></div>
    <div class="col"><div class="swatch e-xl"></div><div class="mono">xl</div></div>
    <div class="col"><div class="swatch e-inset"></div><div class="mono">inset</div></div>
  </div>

  <div class="label">Twin-shadow elevation on a single tonal surface — dark side `rgba(120,140,180,…)` paired with `#FFFFFF` highlight. xs → xl scale offset and blur together. Inset variant recesses the surface for inputs and tracks.</div>
</div>
</body></html>
