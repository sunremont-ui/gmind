<!doctype html>
<html><head><meta charset="utf-8"><title>Chart · donut</title><link rel="stylesheet" href="_card.css">
<style>
  .neu-canvas{
    background:#ECF0F3; border-radius:14px; padding:22px;
    display:flex; gap:24px; align-items:center;
  }
  .neu-disc{
    width:200px; height:200px; border-radius:50%;
    background:#ECF0F3;
    box-shadow:
      12px 12px 30px #D1D9E6,
      -12px -12px 30px #FFFFFF;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .neu-disc svg{ width:100%; height:100%; }
  .neu-legend{ display:flex; flex-direction:column; gap:10px; flex:1; }
  .neu-row{
    display:flex; align-items:center; justify-content:space-between;
    background:#ECF0F3; border-radius:10px; padding:8px 12px;
    box-shadow:
      4px 4px 10px #D1D9E6,
      -4px -4px 10px #FFFFFF;
  }
  .neu-row .l{ display:flex; align-items:center; gap:10px; }
  .neu-row .sw{ width:10px; height:10px; border-radius:3px; }
  .neu-row .name{ font:600 13px 'Inter'; color:#2E3A4B; }
  .neu-row .val{ font-family:'JetBrains Mono'; font-size:12px; color:#7B8794; }
</style>
</head>
<body>
<div class="card" style="background:#ECF0F3;">
  <div class="lds-eyebrow" style="color:#7B8794">Listener split · soft neumorph</div>
  <div class="neu-canvas">

    <div class="neu-disc">
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="donA" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#818CF8"/><stop offset="100%" stop-color="#A78BFA"/></linearGradient>
          <linearGradient id="donB" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FB7185"/><stop offset="100%" stop-color="#FBBF24"/></linearGradient>
          <linearGradient id="donC" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#34D399"/></linearGradient>
          <!-- inner soft shadow that mimics neumorph well -->
          <filter id="innerN" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="off1"/>
            <feComposite in="off1" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="sh1"/>
            <feFlood flood-color="#D1D9E6" flood-opacity="1"/>
            <feComposite in2="sh1" operator="in"/>
          </filter>
        </defs>

        <!-- recessed track -->
        <circle cx="100" cy="100" r="72" fill="none" stroke="#ECF0F3" stroke-width="22"/>
        <circle cx="100" cy="100" r="72" fill="none" stroke="#D1D9E6" stroke-width="22" opacity=".55" stroke-dasharray="0.5 8"/>

        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#donA)" stroke-width="22"
                stroke-dasharray="226 452" stroke-dashoffset="0"
                transform="rotate(-90 100 100)" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#donB)" stroke-width="22"
                stroke-dasharray="135 452" stroke-dashoffset="-230"
                transform="rotate(-90 100 100)" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="72" fill="none" stroke="url(#donC)" stroke-width="22"
                stroke-dasharray="90 452"  stroke-dashoffset="-369"
                transform="rotate(-90 100 100)" stroke-linecap="round"/>

        <text x="100" y="98" text-anchor="middle" font-family="Inter" font-size="30" font-weight="600" fill="#2E3A4B" style="letter-spacing:-0.02em">28.4k</text>
        <text x="100" y="118" text-anchor="middle" font-family="Inter" font-size="11" fill="#7B8794">total listeners</text>
      </svg>
    </div>

    <div class="neu-legend">
      <div class="neu-row">
        <div class="l"><span class="sw" style="background:linear-gradient(135deg,#818CF8,#A78BFA)"></span><span class="name">Subscribed</span></div>
        <span class="val">14 200 · 50%</span>
      </div>
      <div class="neu-row">
        <div class="l"><span class="sw" style="background:linear-gradient(135deg,#FB7185,#FBBF24)"></span><span class="name">Free tier</span></div>
        <span class="val">8 520 · 30%</span>
      </div>
      <div class="neu-row">
        <div class="l"><span class="sw" style="background:linear-gradient(135deg,#22D3EE,#34D399)"></span><span class="name">Trial</span></div>
        <span class="val">5 680 · 20%</span>
      </div>
    </div>

  </div>
</div>
</body></html>
