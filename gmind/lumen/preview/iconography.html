<style>
  .icon-row { gap: 14px; }
  .icon-chip {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #ECF0F3;
    box-shadow:
      4px 4px 10px rgba(120,140,180,0.32),
      -4px -4px 10px rgba(255,255,255,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2A3340;
    transition: box-shadow .18s ease;
  }
  .icon-chip.sm { width: 38px; height: 38px; border-radius: 10px; }
  .icon-chip:hover {
    box-shadow:
      inset 3px 3px 7px rgba(120,140,180,0.28),
      inset -3px -3px 7px rgba(255,255,255,0.92);
  }
  .icon-chip.recessed {
    box-shadow:
      inset 3px 3px 7px rgba(120,140,180,0.28),
      inset -3px -3px 7px rgba(255,255,255,0.92);
  }
</style>
</head>
