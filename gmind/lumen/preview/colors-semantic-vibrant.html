<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic — vibrant</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0">
  <div style="display:flex">
    <div style="flex:1;padding:18px">
      <div class="lds-eyebrow">Variant C · vibrant on light</div>
      <div class="row" style="gap:8px;margin-top:8px">
        <div style="flex:1;height:54px;border-radius:10px;background:linear-gradient(135deg,#10B981,#06B6D4);color:#fff;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Success</div>
        <div style="flex:1;height:54px;border-radius:10px;background:linear-gradient(135deg,#F59E0B,#EC4899);color:#fff;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Warning</div>
        <div style="flex:1;height:54px;border-radius:10px;background:linear-gradient(135deg,#EF4444,#EC4899);color:#fff;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Danger</div>
        <div style="flex:1;height:54px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#5B6CFF);color:#fff;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Info</div>
      </div>
    </div>
    <div style="flex:1;padding:18px;background:#0A0A0F;color:#F4F4F7">
      <div class="lds-eyebrow" style="color:#B4B4BD">on dark</div>
      <div class="row" style="gap:8px;margin-top:8px">
        <div style="flex:1;height:54px;border-radius:10px;background:rgba(16,185,129,0.18);border:1px solid rgba(16,185,129,0.40);color:#34D399;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Success</div>
        <div style="flex:1;height:54px;border-radius:10px;background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.40);color:#FBBF24;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Warning</div>
        <div style="flex:1;height:54px;border-radius:10px;background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.40);color:#F87171;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Danger</div>
        <div style="flex:1;height:54px;border-radius:10px;background:rgba(59,130,246,0.18);border:1px solid rgba(59,130,246,0.40);color:#60A5FA;display:flex;align-items:flex-end;padding:8px;font:600 12px 'Inter'">Info</div>
      </div>
    </div>
  </div>
</div>
</body></html>
