<!doctype html>
<html><head><meta charset="utf-8"><title>Empty state</title><link rel="stylesheet" href="_card.css">
<style>
  .neu-card{ background:#ECF0F3; border-radius:18px; padding:36px 24px;
    box-shadow: 10px 10px 26px rgba(120,140,180,0.22), -10px -10px 26px #FFFFFF; }
  .glyph{ width:104px;height:104px;border-radius:28px;background:#ECF0F3;color:#5B9DF0;
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
    box-shadow: 8px 8px 18px rgba(120,140,180,0.30), -8px -8px 18px #FFFFFF,
      inset 2px 2px 4px rgba(255,255,255,0.6); }
  .nbtn{ padding:11px 18px; border-radius:11px; border:0; font:600 14px 'Inter'; cursor:pointer; color:#fff;
    background:linear-gradient(135deg,#5B9DF0 0%,#5DC79A 55%,#A78BFA 100%);
    box-shadow: 4px 4px 10px rgba(120,140,200,0.40), -4px -4px 10px #FFFFFF; }
  .nbtn.ghost{ background:#ECF0F3; color:#15151B;
    box-shadow: 3px 3px 8px rgba(120,140,180,0.28), -3px -3px 8px #FFFFFF; }
  .center{ text-align:center; }
</style></head>
<body>
<div class="card neu-card">
  <div class="center">
    <div class="glyph">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <h3 style="margin:0 0 6px;font:600 18px 'Inter'">No tracks yet</h3>
    <p style="margin:0 auto 18px;max-width:320px;font:400 13px/1.55 'Inter';color:#57575F">Drop an audio file or import from Spotify to start your first playlist. Lumen will auto-tag tempo and mood.</p>
    <div class="row" style="gap:10px;justify-content:center">
      <button class="nbtn">Upload audio</button>
      <button class="nbtn ghost">Import from Spotify</button>
    </div>
  </div>
</div></body></html>
