<!doctype html>
<html><head><meta charset="utf-8"><title>Toasts &amp; alerts</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#F7F7F8">
  <div class="lds-eyebrow">Feedback · toasts &amp; alerts</div>
  <div class="col" style="gap:10px">
    <div style="display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:12px;padding:12px 14px;box-shadow:0 4px 12px rgba(15,15,25,0.08)">
      <div style="width:28px;height:28px;border-radius:999px;background:#ECFDF5;color:#10B981;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div style="flex:1"><div style="font:600 14px 'Inter'">Track uploaded</div><div style="font:400 13px 'Inter';color:#76767F">"Aurora — slow take" is now ready to share.</div></div>
      <button style="background:transparent;border:0;color:#5B6CFF;font:600 13px 'Inter';cursor:pointer">View</button>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:12px 14px">
      <div style="width:28px;height:28px;border-radius:999px;background:#FEF3C7;color:#92400E;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
      <div style="flex:1"><div style="font:600 14px 'Inter';color:#92400E">Storage almost full</div><div style="font:400 13px 'Inter';color:#92400E;opacity:0.8">Free up 2.4 GB to keep syncing.</div></div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:12px 14px">
      <div style="width:28px;height:28px;border-radius:999px;background:#FEE2E2;color:#B91C1C;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></div>
      <div style="flex:1"><div style="font:600 14px 'Inter';color:#B91C1C">Couldn't reach the server</div><div style="font:400 13px 'Inter';color:#B91C1C;opacity:0.8">Check your connection and try again.</div></div>
    </div>
  </div>
</div>
</body></html>
