<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic — in use, soft gradient</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="lds-eyebrow">Variant F · in use · muted gradients</div>

  <div style="position:relative;display:flex;gap:10px;align-items:flex-start;border-radius:4px;padding:10px 12px;overflow:hidden;background:linear-gradient(90deg,#EAF6F0 0%,#F2F9F5 55%,#F7FBF8 100%)">
    <span style="position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#7FB89C,#5A9D7E)"></span>
    <span style="display:inline-flex;width:7px;height:7px;border-radius:2px;background:linear-gradient(135deg,#7FB89C,#5A9D7E);margin-top:6px"></span>
    <div style="flex:1;font:500 13px 'Inter';color:#2F5C46"><strong>Track uploaded.</strong> "Aurora — slow take" is now ready to share.</div>
    <span style="padding:3px 9px;border-radius:4px;background:linear-gradient(135deg,#6FAB8E 0%,#5A9D7E 100%);color:#fff;font:600 11px 'Inter';box-shadow:inset 0 1px 0 rgba(255,255,255,.18)">200 OK</span>
  </div>

  <div style="position:relative;display:flex;gap:10px;align-items:flex-start;border-radius:4px;padding:10px 12px;overflow:hidden;background:linear-gradient(90deg,#F6F0DF 0%,#FAF5E8 55%,#FCF9F1 100%)">
    <span style="position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#C9A85F,#B08F3F)"></span>
    <span style="display:inline-flex;width:7px;height:7px;border-radius:2px;background:linear-gradient(135deg,#C9A85F,#B08F3F);margin-top:6px"></span>
    <div style="flex:1;font:500 13px 'Inter';color:#6B5023"><strong>Storage almost full.</strong> Free up 2.4 GB to keep syncing.</div>
    <span style="padding:3px 9px;border-radius:4px;background:linear-gradient(135deg,#BE9C52 0%,#A0813A 100%);color:#fff;font:600 11px 'Inter';box-shadow:inset 0 1px 0 rgba(255,255,255,.18)">87%</span>
  </div>

  <div style="position:relative;display:flex;gap:10px;align-items:flex-start;border-radius:4px;padding:10px 12px;overflow:hidden;background:linear-gradient(90deg,#F4E1E1 0%,#F8EBEB 55%,#FBF3F3 100%)">
    <span style="position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,#C77B7B,#A85959)"></span>
    <span style="display:inline-flex;width:7px;height:7px;border-radius:2px;background:linear-gradient(135deg,#C77B7B,#A85959);margin-top:6px"></span>
    <div style="flex:1;font:500 13px 'Inter';color:#6E2E2E"><strong>Couldn't reach the server.</strong> Check your connection and try again.</div>
    <span style="padding:3px 9px;border-radius:4px;background:linear-gradient(135deg,#BB6E6E 0%,#9C4E4E 100%);color:#fff;font:600 11px 'Inter';box-shadow:inset 0 1px 0 rgba(255,255,255,.18)">503</span>
  </div>
</div>
</body></html>
