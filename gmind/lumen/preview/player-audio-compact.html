<!doctype html>
<html><head><meta charset="utf-8"><title>Audio player — compact</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0">
  <div style="background:#15151B;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:14px;border-radius:0">
    <button style="width:40px;height:40px;border-radius:999px;background:#fff;color:#15151B;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <div style="width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,#06B6D4,#0EA5E9)"></div>
    <div style="flex:1;min-width:0">
      <div style="font:600 14px 'Inter';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Late drift, vol. III</div>
      <div style="font:400 12px 'Inter';color:rgba(255,255,255,0.65)">Marin · 2 hrs ago</div>
    </div>
    <div class="row" style="gap:2px;align-items:flex-end;height:32px">
      <div style="width:3px;height:40%;background:#5B6CFF;border-radius:2px"></div>
      <div style="width:3px;height:80%;background:#5B6CFF;border-radius:2px"></div>
      <div style="width:3px;height:60%;background:#5B6CFF;border-radius:2px"></div>
      <div style="width:3px;height:90%;background:#EC4899;border-radius:2px"></div>
      <div style="width:3px;height:40%;background:#EC4899;border-radius:2px"></div>
      <div style="width:3px;height:70%;background:#EC4899;border-radius:2px"></div>
      <div style="width:3px;height:50%;background:rgba(255,255,255,0.25);border-radius:2px"></div>
      <div style="width:3px;height:30%;background:rgba(255,255,255,0.25);border-radius:2px"></div>
      <div style="width:3px;height:60%;background:rgba(255,255,255,0.25);border-radius:2px"></div>
      <div style="width:3px;height:80%;background:rgba(255,255,255,0.25);border-radius:2px"></div>
      <div style="width:3px;height:50%;background:rgba(255,255,255,0.25);border-radius:2px"></div>
      <div style="width:3px;height:40%;background:rgba(255,255,255,0.25);border-radius:2px"></div>
    </div>
    <div style="font-family:'JetBrains Mono';font-feature-settings:'tnum';font-size:12px;color:rgba(255,255,255,0.7)">1:24 / 3:42</div>
  </div>
  <div style="padding:14px 18px;display:flex;justify-content:space-between;font:500 12px 'Inter';color:#76767F">
    <span>Compact bar — fits in app sidebar or footer.</span>
    <span style="color:#5B6CFF;font-weight:600">Show queue ›</span>
  </div>
</div>
</body></html>
