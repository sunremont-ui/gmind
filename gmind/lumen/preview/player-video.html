<!doctype html>
<html><head><meta charset="utf-8"><title>Video player</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;overflow:hidden;background:#0A0A0F">
  <div style="position:relative;height:300px;background:
    radial-gradient(at 30% 30%, rgba(91,108,255,0.55) 0px, transparent 55%),
    radial-gradient(at 70% 70%, rgba(236,72,153,0.45) 0px, transparent 55%),
    #15151B">
    <!-- top chrome -->
    <div style="position:absolute;top:0;left:0;right:0;padding:16px 18px;background:linear-gradient(180deg,rgba(0,0,0,0.55),transparent);display:flex;justify-content:space-between;align-items:center;color:#fff">
      <div>
        <div style="font:600 16px 'Inter';letter-spacing:-0.01em">Northern lights, ep 02</div>
        <div style="font:400 12px 'Inter';opacity:0.7">Lumen Originals · 4K HDR</div>
      </div>
      <div class="row" style="gap:6px">
        <button style="width:32px;height:32px;border-radius:999px;background:rgba(255,255,255,0.14);border:0;color:#fff;cursor:pointer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <!-- center play -->
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
      <button style="width:72px;height:72px;border-radius:999px;background:rgba(255,255,255,0.18);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      </button>
    </div>
    <!-- bottom chrome -->
    <div style="position:absolute;bottom:0;left:0;right:0;padding:14px 18px;background:linear-gradient(0deg,rgba(0,0,0,0.65),transparent);color:#fff">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="flex:1;height:4px;border-radius:999px;background:rgba(255,255,255,0.20);position:relative">
          <div style="position:absolute;left:0;top:0;height:4px;width:42%;border-radius:999px;background:#fff"></div>
          <div style="position:absolute;left:0;top:0;height:4px;width:55%;border-radius:999px;background:rgba(255,255,255,0.35)"></div>
          <div style="position:absolute;left:42%;top:50%;width:12px;height:12px;border-radius:999px;background:#fff;transform:translate(-50%,-50%)"></div>
        </div>
        <div style="font-family:'JetBrains Mono';font-feature-settings:'tnum';font-size:11px;opacity:0.85">12:14 / 28:50</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <button style="background:transparent;border:0;color:#fff;cursor:pointer"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <button style="background:transparent;border:0;color:#fff;cursor:pointer;font:500 12px 'Inter'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg></button>
        <div style="flex:1"></div>
        <span style="padding:3px 8px;border-radius:6px;background:rgba(255,255,255,0.18);font:600 11px 'Inter';letter-spacing:0.04em">4K</span>
        <span style="padding:3px 8px;border-radius:6px;background:rgba(255,255,255,0.18);font:600 11px 'Inter';letter-spacing:0.04em">CC</span>
        <button style="background:transparent;border:0;color:#fff;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
      </div>
    </div>
  </div>
</div>
</body></html>
