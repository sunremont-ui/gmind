<!doctype html>
<html><head><meta charset="utf-8"><title>Audio player</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;overflow:hidden">
  <div style="background:linear-gradient(135deg,#0E7C7B 0%,#0EA5E9 45%,#6366F1 100%);padding:22px 24px;color:#fff;display:flex;align-items:center;gap:18px">
    <div style="width:72px;height:72px;border-radius:14px;background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.3)">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </div>
    <div style="flex:1">
      <div style="font:500 12px 'Inter';opacity:0.85;letter-spacing:0.04em;text-transform:uppercase">Now playing</div>
      <div style="font:600 20px/1.2 'Inter';letter-spacing:-0.01em;margin-top:4px">Aurora — slow take</div>
      <div style="font:400 13px 'Inter';opacity:0.85">Lumen Studio · 2026 · Ambient</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button style="width:36px;height:36px;border-radius:999px;background:rgba(255,255,255,0.18);border:0;color:#fff;cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
    </div>
  </div>
  <div style="padding:18px 24px;background:#fff;display:flex;align-items:center;gap:18px">
    <button style="background:transparent;border:0;color:#3F3F46;cursor:pointer"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>
    <button style="width:48px;height:48px;border-radius:999px;background:#15151B;color:#fff;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(15,15,25,0.20)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button style="background:transparent;border:0;color:#3F3F46;cursor:pointer"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
    <div style="font-family:'JetBrains Mono';font-feature-settings:'tnum';font-size:12px;color:#57575F">1:24</div>
    <div style="flex:1;height:6px;border-radius:999px;background:#EEEEF1;position:relative">
      <div style="position:absolute;left:0;top:0;height:6px;width:38%;border-radius:999px;background:linear-gradient(90deg,#0EA5E9,#6366F1)"></div>
      <div style="position:absolute;left:38%;top:50%;width:14px;height:14px;border-radius:999px;background:#fff;border:2px solid #0EA5E9;transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(15,15,25,0.20)"></div>
    </div>
    <div style="font-family:'JetBrains Mono';font-feature-settings:'tnum';font-size:12px;color:#9C9CA6">3:42</div>
  </div>
</div>
</body></html>
