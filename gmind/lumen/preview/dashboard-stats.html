<!doctype html>
<html><head><meta charset="utf-8"><title>Stat tiles</title><link rel="stylesheet" href="_card.css">
<style>
  .neu-bg{ background:#ECF0F3; border-radius:14px; padding:18px; }
  .neu-tile{
    flex:1; background:#ECF0F3; border-radius:18px; padding:18px;
    box-shadow:
      12px 12px 30px #D1D9E6,
      -12px -12px 30px #FFFFFF;
    transition:box-shadow .3s ease, transform .25s ease;
  }
  .neu-tile:hover{
    transform:translateY(-1px);
    box-shadow:
      16px 16px 36px #C9D2E0,
      -16px -16px 36px #FFFFFF;
  }
  .neu-label{ font:500 12px 'Inter'; color:#7B8794; letter-spacing:.02em; }
  .neu-num{ font:600 26px/1.1 'Inter'; letter-spacing:-0.02em; font-feature-settings:'tnum'; margin-top:6px; color:#2E3A4B; }
  .neu-delta-up{ display:flex;align-items:center;gap:4px;margin-top:8px;font:600 12px 'Inter';color:#10B981; }
  .neu-delta-dn{ display:flex;align-items:center;gap:4px;margin-top:8px;font:600 12px 'Inter';color:#EF4444; }
  .neu-vs{ color:#9CA9B8; font-weight:500; margin-left:4px; }

  /* highlighted accent tile keeps neumorph silhouette but tints the surface */
  .neu-accent{
    background:linear-gradient(135deg,#A5B4FC 0%, #C4B5FD 50%, #FBCFE8 100%);
    color:#2E1A55;
    box-shadow:
      12px 12px 30px #D1D9E6,
      -12px -12px 30px #FFFFFF,
      inset 1px 1px 2px rgba(255,255,255,.55),
      inset -1px -1px 2px rgba(60,40,120,.10);
  }
  .neu-accent .neu-label{ color:#3B2F6E; opacity:.75; }
  .neu-accent .neu-num{ color:#2E1A55; }
  .neu-accent .neu-delta-up{ color:#2E1A55; }
  .neu-accent .neu-vs{ color:#2E1A55; opacity:.6; }

  /* sparkline well — pressed-in look */
  .neu-well{
    margin-top:10px; padding:6px 4px; border-radius:8px; background:#ECF0F3;
    box-shadow:
      inset 4px 4px 8px #D1D9E6,
      inset -4px -4px 8px #FFFFFF;
  }
</style>
</head>
<body>
<div class="card" style="background:#ECF0F3; padding:18px">
  <div class="lds-eyebrow" style="color:#7B8794">Dashboard · stat tiles · soft neumorph</div>

  <div class="row" style="gap:18px;align-items:stretch">
    <div class="neu-tile">
      <div class="neu-label">Plays today</div>
      <div class="neu-num">128 410</div>
      <div class="neu-delta-up">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        12.4%<span class="neu-vs">vs yesterday</span>
      </div>
    </div>

    <div class="neu-tile">
      <div class="neu-label">Avg. listen time</div>
      <div class="neu-num">4m 12s</div>
      <div class="neu-delta-dn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        2.1%
      </div>
    </div>

    <div class="neu-tile">
      <div class="neu-label">Conversion</div>
      <div class="neu-num">3.84%</div>
      <div class="neu-well">
        <svg viewBox="0 0 100 24" preserveAspectRatio="none" style="display:block;width:100%;height:24px"><path d="M0 18 L12 14 L24 16 L36 10 L48 12 L60 6 L72 8 L84 4 L100 7" stroke="#818CF8" stroke-width="1.6" fill="none"/></svg>
      </div>
    </div>

    <div class="neu-tile neu-accent">
      <div class="neu-label">Revenue · MTD</div>
      <div class="neu-num">$48 902</div>
      <div class="neu-delta-up">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        24.7%<span class="neu-vs">on track</span>
      </div>
    </div>
  </div>
</div>
</body></html>
