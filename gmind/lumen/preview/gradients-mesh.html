<!doctype html>
<html><head><meta charset="utf-8"><title>Mesh background</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;overflow:hidden">
  <div style="height:240px;background:
    radial-gradient(at 12% 18%, rgba(91,108,255,0.45) 0px, transparent 45%),
    radial-gradient(at 88% 12%, rgba(236,72,153,0.35) 0px, transparent 45%),
    radial-gradient(at 70% 90%, rgba(6,182,212,0.4) 0px, transparent 50%),
    #F7F7F8;
    display:flex;align-items:center;justify-content:center">
    <div style="font:600 28px/1.1 var(--font-sans);letter-spacing:-0.02em;color:#15151B">A soft, ambient stage</div>
  </div>
  <div style="padding:16px 24px 24px">
    <div class="label">Mesh — multi-radial blurs over the base surface. Use behind dashboards or hero copy. Auto-darkens in dark mode.</div>
  </div>
</div>
</body></html>
