<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="lds-eyebrow">Corner radius</div>
  <div class="row" style="gap:14px;align-items:flex-end">
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:3.8px"></div><div class="mono" style="margin-top:6px">xs · 3.8</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:7.6px"></div><div class="mono" style="margin-top:6px">sm · 7.6</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:11.4px"></div><div class="mono" style="margin-top:6px">md · 11.4</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:15.2px"></div><div class="mono" style="margin-top:6px">lg · 15.2</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:19px"></div><div class="mono" style="margin-top:6px">xl · 19</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:26.6px"></div><div class="mono" style="margin-top:6px">2xl · 26.6</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--color-primary);border-radius:999px"></div><div class="mono" style="margin-top:6px">full</div></div>
  </div>
  <div class="label">Pill radius (full) is for badges and chips only — never wide buttons or cards.</div>
</div>
</body></html>
