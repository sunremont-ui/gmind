<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic — soft</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="lds-eyebrow">Variant B · soft tonal pairs</div>
  <div class="row" style="gap:12px">
    <div style="flex:1;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:12px;padding:12px">
      <div style="font:600 13px 'Inter';color:#047857">Success</div>
      <div class="mono" style="color:#047857">bg #ECFDF5 · fg #047857</div>
      <div style="margin-top:6px;height:6px;border-radius:999px;background:linear-gradient(90deg,#10B981,#34D399)"></div>
    </div>
    <div style="flex:1;background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:12px">
      <div style="font:600 13px 'Inter';color:#92400E">Warning</div>
      <div class="mono" style="color:#92400E">bg #FFFBEB · fg #92400E</div>
      <div style="margin-top:6px;height:6px;border-radius:999px;background:linear-gradient(90deg,#F59E0B,#FBBF24)"></div>
    </div>
    <div style="flex:1;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:12px">
      <div style="font:600 13px 'Inter';color:#B91C1C">Danger</div>
      <div class="mono" style="color:#B91C1C">bg #FEF2F2 · fg #B91C1C</div>
      <div style="margin-top:6px;height:6px;border-radius:999px;background:linear-gradient(90deg,#EF4444,#F87171)"></div>
    </div>
    <div style="flex:1;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;padding:12px">
      <div style="font:600 13px 'Inter';color:#1D4ED8">Info</div>
      <div class="mono" style="color:#1D4ED8">bg #EFF6FF · fg #1D4ED8</div>
      <div style="margin-top:6px;height:6px;border-radius:999px;background:linear-gradient(90deg,#3B82F6,#60A5FA)"></div>
    </div>
  </div>
  <div class="label">Each status ships as a paired token (background + foreground + accent stripe). Use for inline banners, toasts, table rows.</div>
</div>
</body></html>
