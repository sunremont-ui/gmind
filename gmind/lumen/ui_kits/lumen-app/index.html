<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lumen — UI kit</title>
  <link rel="icon" href="../../assets/lumen-logo.svg" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--color-bg); color: var(--color-fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    .lds-app { display: flex; min-height: 100vh; }
    .lds-app main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .lds-app .scroll { flex: 1; overflow-y: auto; padding: 24px 28px 12px; display: flex; flex-direction: column; gap: 16px; }
    .nav-item:hover { background: var(--color-overlay-hover); }
    .nav-active:hover { background: var(--color-primary-soft); }
    button:focus-visible, input:focus-visible { outline: 0; box-shadow: var(--shadow-glow-primary); }
    /* scrollbar */
    .scroll::-webkit-scrollbar { width: 10px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }

    /* ---------- Tinted neumorph layer (light theme only) ---------- */
    html[data-theme="light"] body,
    html:not([data-theme]) body { background:linear-gradient(135deg,#F0F5FD 0%,#F2F9F6 50%,#F6F2FC 100%) fixed; }
    html[data-theme="light"] .lds-app,
    html:not([data-theme]) .lds-app { background:transparent; }

    html[data-theme="light"] .scroll > div:not(.lds-keep),
    html[data-theme="light"] .scroll > section:not(.lds-keep),
    html[data-theme="light"] .lds-card:not(.lds-keep),
    html:not([data-theme]) .scroll > div:not(.lds-keep),
    html:not([data-theme]) .scroll > section:not(.lds-keep),
    html:not([data-theme]) .lds-card:not(.lds-keep){
      background:#F4F7FB !important;
      border:0 !important;
      border-radius:18px !important;
      box-shadow: 10px 10px 26px rgba(120,140,180,0.22), -10px -10px 26px #FFFFFF !important;
    }
    /* keep grid containers transparent so each cell gets its own neumorph */
    html[data-theme="light"] .scroll > div[style*="grid"],
    html:not([data-theme]) .scroll > div[style*="grid"]{
      background:transparent !important;
      box-shadow:none !important;
      border-radius:0 !important;
    }
    html[data-theme="light"] .scroll > div[style*="grid"] > *,
    html:not([data-theme]) .scroll > div[style*="grid"] > *{
      background:#F4F7FB !important;
      border:0 !important;
      border-radius:18px !important;
      box-shadow: 8px 8px 22px rgba(120,140,180,0.22), -8px -8px 22px #FFFFFF !important;
    }
    /* preserve gradient + white text on accent stat tile */
    html[data-theme="light"] .scroll > div[style*="grid"] > .lds-stat-accent,
    html:not([data-theme]) .scroll > div[style*="grid"] > .lds-stat-accent{
      background: linear-gradient(135deg, #3B5BD9 0%, #6B5BC9 50%, #C04A8C 100%) !important;
      box-shadow: 8px 8px 22px rgba(120,140,180,0.22), -8px -8px 22px #FFFFFF, 0 8px 24px rgba(60,80,200,0.25) !important;
      color:#fff !important;
    }
    /* recessed inputs / search fields */
    html[data-theme="light"] input[type="text"],
    html[data-theme="light"] input[type="search"],
    html:not([data-theme]) input[type="text"],
    html:not([data-theme]) input[type="search"]{
      background:#EBEFF6 !important;
      border:0 !important;
      box-shadow: inset 4px 4px 8px rgba(120,140,180,0.25), inset -4px -4px 8px #FFFFFF !important;
    }
    /* sidebar lift */
    html[data-theme="light"] aside,
    html:not([data-theme]) aside{
      background:linear-gradient(180deg,#F4F7FB 0%,#EEF1F8 100%) !important;
      border:0 !important;
      box-shadow: 12px 0 30px -10px rgba(120,140,180,0.25) !important;
    }

    /* ---------- Soft neumorph on small UI ---------- */
    /* Default: raise every button gently */
    html[data-theme="light"] button:not(.lds-keep button):not(.lds-flat),
    html:not([data-theme]) button:not(.lds-keep button):not(.lds-flat){
      background:#F4F7FB !important;
      border:0 !important;
      border-radius:12px !important;
      box-shadow: 4px 4px 10px rgba(120,140,180,0.22), -4px -4px 10px #FFFFFF !important;
      transition: box-shadow .18s ease, background .18s ease, transform .15s ease !important;
    }
    html[data-theme="light"] button:not(.lds-keep button):not(.lds-flat):hover,
    html:not([data-theme]) button:not(.lds-keep button):not(.lds-flat):hover{
      box-shadow: none !important;
      background:#EEF1F8 !important;
    }
    html[data-theme="light"] button:not(.lds-keep button):not(.lds-flat):active,
    html:not([data-theme]) button:not(.lds-keep button):not(.lds-flat):active{
      box-shadow: inset 3px 3px 6px rgba(120,140,180,0.30), inset -3px -3px 6px #FFFFFF !important;
    }
    /* Topbar avatar / round controls inherit too — keep circular if they were */
    html[data-theme="light"] .lds-icon-btn,
    html:not([data-theme]) .lds-icon-btn{
      background:#F4F7FB !important;
      border:0 !important;
      box-shadow: 4px 4px 10px rgba(120,140,180,0.22), -4px -4px 10px #FFFFFF !important;
    }
    /* Sidebar nav items: raised by default, flatten on hover */
    html[data-theme="light"] .nav-item,
    html:not([data-theme]) .nav-item{
      background:#F4F7FB !important;
      border-radius:12px !important;
      box-shadow: 4px 4px 10px rgba(120,140,180,0.20), -4px -4px 10px #FFFFFF !important;
      transition: box-shadow .18s ease, background .18s ease !important;
      margin: 2px 0 !important;
    }
    html[data-theme="light"] .nav-item:hover,
    html:not([data-theme]) .nav-item:hover{
      background:#EEF1F8 !important;
      box-shadow: none !important;
    }
    html[data-theme="light"] .nav-active,
    html:not([data-theme]) .nav-active{
      background:#EBEFF6 !important;
      box-shadow: inset 3px 3px 7px rgba(120,140,180,0.28), inset -3px -3px 7px #FFFFFF !important;
    }
    html[data-theme="light"] .nav-active:hover,
    html:not([data-theme]) .nav-active:hover{
      background:#EBEFF6 !important;
      box-shadow: inset 3px 3px 7px rgba(120,140,180,0.28), inset -3px -3px 7px #FFFFFF !important;
    }
    /* Track / list rows inside cards — gentle raised pills */
    html[data-theme="light"] .lds-row,
    html:not([data-theme]) .lds-row{
      background:#F4F7FB !important;
      border:0 !important;
      border-radius:14px !important;
      box-shadow: 4px 4px 10px rgba(120,140,180,0.18), -4px -4px 10px #FFFFFF !important;
    }
    /* Chips / badges */
    html[data-theme="light"] .lds-chip,
    html:not([data-theme]) .lds-chip{
      background:#F4F7FB !important;
      border:0 !important;
      box-shadow: 3px 3px 7px rgba(120,140,180,0.20), -3px -3px 7px #FFFFFF !important;
    }
    /* Progress / range tracks (audio dock seek bar etc) */
    html[data-theme="light"] .lds-track,
    html:not([data-theme]) .lds-track{
      background:#EBEFF6 !important;
      box-shadow: inset 2px 2px 5px rgba(120,140,180,0.30), inset -2px -2px 5px #FFFFFF !important;
      border-radius:999px !important;
    }

    /* ---------- Broad neumorph coverage ---------- */
    /* Top bar: flat translucent w/ recessed bottom edge */
    html[data-theme="light"] header,
    html:not([data-theme]) header{
      background:#F4F7FB !important;
      border-bottom:0 !important;
      box-shadow: 0 6px 16px -10px rgba(120,140,180,0.35), inset 0 -1px 0 rgba(255,255,255,0.9) !important;
    }
    /* Audio dock: raised pill */
    html[data-theme="light"] .scroll > div:last-child,
    html:not([data-theme]) .scroll > div:last-child{
      background:#F4F7FB !important;
      border:0 !important;
      box-shadow: 10px 10px 26px rgba(120,140,180,0.28), -10px -10px 26px #FFFFFF !important;
    }
    /* Sidebar inner cards (workspace switcher + profile pill) */
    html[data-theme="light"] aside > button,
    html:not([data-theme]) aside > button,
    html[data-theme="light"] aside > div:last-of-type,
    html:not([data-theme]) aside > div:last-of-type{
      background:#F4F7FB !important;
      border:0 !important;
      border-radius:12px !important;
      box-shadow: 4px 4px 10px rgba(120,140,180,0.22), -4px -4px 10px #FFFFFF !important;
    }
    /* Track rows in TopTracks table — raised by default, flatten on hover */
    html[data-theme="light"] tbody tr,
    html:not([data-theme]) tbody tr{
      transition: box-shadow .18s ease, background .18s ease;
      background:#F4F7FB;
      box-shadow: 4px 4px 10px rgba(120,140,180,0.16), -4px -4px 10px #FFFFFF;
    }
    html[data-theme="light"] tbody tr:hover,
    html:not([data-theme]) tbody tr:hover{
      background:#EEF1F8;
      box-shadow:none;
    }
    html[data-theme="light"] tbody tr td:first-child,
    html:not([data-theme]) tbody tr td:first-child{ border-top-left-radius:12px; border-bottom-left-radius:12px; }
    html[data-theme="light"] tbody tr td:last-child,
    html:not([data-theme]) tbody tr td:last-child{ border-top-right-radius:12px; border-bottom-right-radius:12px; }
    /* Table headers */
    html[data-theme="light"] thead th,
    html:not([data-theme]) thead th{
      border-bottom:0 !important;
      box-shadow: inset 0 -1px 0 rgba(120,140,180,0.18) !important;
    }
    /* FileTree rows: hover raise, active recessed */
    html[data-theme="light"] aside ~ * .nav-item,
    html:not([data-theme]) aside ~ * .nav-item { /* no-op placeholder */ }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="lds-body">
  <div id="root"></div>

  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="HeroBanner.jsx"></script>
  <script type="text/babel" src="StatTile.jsx"></script>
  <script type="text/babel" src="AreaChart.jsx"></script>
  <script type="text/babel" src="TopTracks.jsx"></script>
  <script type="text/babel" src="FileTree.jsx"></script>
  <script type="text/babel" src="AudioDock.jsx"></script>
  <script type="text/babel" src="VideoTile.jsx"></script>

  <script type="text/babel">
    function App() {
      const [theme, setTheme] = React.useState("light");
      const [playing, setPlaying] = React.useState(true);
      React.useLayoutEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);
      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });
      return (
        <div className="lds-app">
          <Sidebar active="Overview" />
          <main>
            <TopBar theme={theme} setTheme={setTheme} />
            <div className="scroll">
              <HeroBanner />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
                <StatTile label="Plays today"      value="128 410" delta="12.4%" deltaDir="up"   trend="M0 18 L12 14 L24 16 L36 10 L48 12 L60 6 L72 8 L84 4 L100 7" />
                <StatTile label="Avg. listen time" value="4m 12s"  delta="2.1%"  deltaDir="down" trend="M0 6 L12 8 L24 7 L36 12 L48 9 L60 13 L72 11 L84 14 L100 16" />
                <StatTile label="Conversion"        value="3.84%"   delta="0.6%"  deltaDir="up"   trend="M0 14 L12 11 L24 13 L36 9 L48 10 L60 6 L72 8 L84 4 L100 6" />
                <StatTile label="Revenue · MTD"     value="$48 902" delta="24.7%" deltaDir="up"   accent />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 14 }}>
                <AreaChart />
                <FileTree />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 14 }}>
                <TopTracks />
                <VideoTile />
              </div>
              <AudioDock playing={playing} setPlaying={setPlaying} />
            </div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
