services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1010:1010"
    volumes:
      - gmind-data:/data
    environment:
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
      - AI_ENDPOINT=${AI_ENDPOINT:-https://api.openai.com/v1}
      - YANDEX_API_KEY=${YANDEX_API_KEY:-}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID:-}
      - YANDEX_MODEL=${YANDEX_MODEL:-yandexgpt}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:1011,http://localhost:1012,http://localhost:3000}
      - PORT=1010
      - DB_PATH=/data/gmind.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1012:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  gmind-data:
