run:
  timeout: 3m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - wastedassign
    - whitespace
    - decorder
    - goconst
    - gofmt
    - goimports
    - mirror
    - nosprintfhostport
    - perfsprint

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*database/sql.Tx).Rollback
      - (*os.File).Close
      - os.Remove
      - (net/http.ResponseWriter).Write
      - (*github.com/gorilla/websocket.Conn).Close
      - encoding/json.Marshal
      - encoding/json.Unmarshal
      - encoding/json.MarshalIndent
      - (*encoding/json.Encoder).Encode
      - (*github.com/gmind/backend/internal/store.Store).Close
      - (*github.com/gmind/backend/internal/store.TaskStore).UpdateStatus
      - (*github.com/gmind/backend/internal/store.Store).GetWorkbook
      - (*github.com/gmind/backend/internal/store.Store).CreateWorkbook
      - (*github.com/gmind/backend/internal/store.Store).GetCollaborators
      - (*github.com/gmind/backend/internal/store.Store).ListWorkbooks
      - (*github.com/gmind/backend/internal/agent.TaskQueue).Enqueue
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/anomalyco/gmind
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
  staticcheck:
    checks:
      - all
      - -SA1019
  decorder:
    dec-order:
      - type
      - const
      - var
      - func
    ignore-dec-order-during-test: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 10
